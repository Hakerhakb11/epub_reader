<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Index</title>
        <title>
            {% block title %}{% endblock title %}
        </title>
        <style>
            body {
                margin: 0;
                background-color: black;
                color: white;
                font-size: 30px;
            }
            .container {
                display: flex;
                flex-direction: row;
                height: 100vh; 
            }
            aside {
                width: 210px;
                transition: width 0.3s ease;
                display: flex;
                flex-direction: column;
                flex-shrink: 0;
                overflow: hidden;
                
            }
            aside:has(details:not([open])) {
                width: 60px;
                
            }
            aside a {
                text-decoration: none;
                width: 100%;
                box-sizing: border-box;
                text-align: center;
                white-space: nowrap;
                overflow: hidden;  
                text-overflow: ellipsis;          
                color: white;
                border: 2px solid white;
                padding: 10px;
                display: inline-block;
                transition: 0.2s;
                flex-shrink: 0;
            }
            aside a:hover {
                background-color: white;
                color: black;
            }
            main {
                padding: 0px 100px 0px 100px;
                overflow-y: auto;
                display: flex;
                flex-grow: 1;
                flex-direction: column;
                align-items: center;
            }
            summary {
                list-style: none;
                cursor: pointer;
                user-select: none;
                height: 40px;
                padding: 10px;
                border: 1px solid white;
                text-align: center;
            }
            details[open] {
                color: yellow;
                display: flex;
                height: 100%;
                flex-direction: column;   
            }
            summary:hover {
                background-color: #333333;
                transition: 0.3s;
            }
            /* aside details:not([open]) {
                color: red;
            } */
            .aside-links {
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                max-height: calc(100vh - 80px);
            }
            {% block style %}{% endblock style %}
        </style>
    </head>
    <body>
        <div class="container">
            <aside>
                <details {% if user_text %} close {% endif %}>
                    <summary>&#9776;</summary>
                    <div class="aside-links">
                        <a href="#">1</a>
                        <a href="#">1</a>
                        <a href="#">1</a>
                        <a href="#">1</a>
                        <a href="#">1</a>
                        <a href="#">1</a>
                        <a href="#">1</a>
                        <a href="#">1</a>
                        <a href="#">1</a>
                    </div>
                </details>
            </aside>
            <main>
                {% block body %}{% endblock body %}
            </main>
        </div>
    </body>
</html>
