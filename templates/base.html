<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}{% endblock title %}</title>

        <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
        <script src="{{ url_for('static', filename='js/base.js') }}" defer></script>
        
        {% block extra_head %}{% endblock extra_head %}
        
        <style>
            {% block style %}{% endblock style %}
        </style>
    </head>
    <body>
        <div class="container">
            <aside>
                <details id="mainSidebar">
                <script>
                    if (localStorage.getItem('mainSidebarOpen') === 'true') {
                        document.currentScript.parentElement.open = true;
                    }
                </script>
                    <summary>&#9776;</summary>
                    <div class="aside-links">
                        {% block aside %}{% endblock aside %}
                    </div>
                </details>
            </aside>
            <main>
                {% block body %}{% endblock body %}
            </main>
        </div>
    </body>
</html>
